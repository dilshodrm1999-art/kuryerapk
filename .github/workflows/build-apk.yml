name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: JDK 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK sozlash
        uses: android-actions/setup-android@v3

      - name: Gradle o'rnatish (8.7)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Debug APK build qilish
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: APK manzilini topish
        id: apk
        run: |
          FILE=$(find app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "Topilgan APK: $FILE"
          mkdir -p out
          cp "$FILE" out/kuryer.apk
          ls -la out

      - name: APK'ni artifact sifatida saqlash
        uses: actions/upload-artifact@v4
        with:
          name: kuryer-apk
          path: out/kuryer.apk
          if-no-files-found: error

      - name: Release'ga APK joylash (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Kuryer APK (oxirgi)"
          draft: false
          prerelease: false
          make_latest: true
          files: out/kuryer.apk
          body: |
            Kuryer ilovasi — avtomatik build.
            kuryer.apk faylini telefoningizga yuklab o'rnating.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
